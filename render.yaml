databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg

services:
  - type: web
    name: breathe-esg-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput
    preDeployCommand: python backend/manage.py migrate && python backend/manage.py seed_demo
    startCommand: cd backend && gunicorn breathe_esg_api.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: breathe-esg-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breathe-esg-review.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://breathe-esg-review.onrender.com

  - type: web
    name: breathe-esg-review
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://breathe-esg-api.onrender.com
